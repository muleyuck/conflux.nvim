version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    assignees:
      - muleyuck
    groups:
      dependencies:
        patterns:
          - "*"
    schedule:
      interval: weekly
      day: saturday
      timezone: Asia/Tokyo
    commit-message:
      prefix: "chore"
      include: "scope"
    open-pull-requests-limit: 10
