name: Release Please

on:
  workflow_run:
    workflows:
      - unit-test
    types:
      - completed
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release
        with:
          release-type: simple
      - uses: actions/checkout@v6
      - name: Update stable tag
        if: ${{ steps.release.outputs.release_created }}
        run: |
          git tag -fa stable "${{ steps.release.outputs.sha }}" -m "Current stable release: ${{ steps.release.outputs.tag_name }}"
          git push origin stable --force
